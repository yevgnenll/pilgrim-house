name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 매일 오전 6시 (KST) = UTC 21:00 전날
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Check secrets
        run: |
          echo "=== Notion Secret 확인 ==="
          echo "NOTION_TOKEN 길이: ${#NOTION_TOKEN}"
          echo "NOTION_TOKEN 앞 10자: ${NOTION_TOKEN:0:10}..."
          echo "NOTION_PRAYER_DB_ID: '$NOTION_PRAYER_DB_ID' (길이: ${#NOTION_PRAYER_DB_ID})"
          echo "NOTION_GALLERY_DB_ID: '$NOTION_GALLERY_DB_ID' (길이: ${#NOTION_GALLERY_DB_ID})"
          echo "NOTION_NEWS_DB_ID: '$NOTION_NEWS_DB_ID' (길이: ${#NOTION_NEWS_DB_ID})"
          echo "=========================="
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PRAYER_DB_ID: ${{ secrets.NOTION_PRAYER_DB_ID }}
          NOTION_GALLERY_DB_ID: ${{ secrets.NOTION_GALLERY_DB_ID }}
          NOTION_NEWS_DB_ID: ${{ secrets.NOTION_NEWS_DB_ID }}

      - name: Build
        run: npm run build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PRAYER_DB_ID: ${{ secrets.NOTION_PRAYER_DB_ID }}
          NOTION_GALLERY_DB_ID: ${{ secrets.NOTION_GALLERY_DB_ID }}
          NOTION_NEWS_DB_ID: ${{ secrets.NOTION_NEWS_DB_ID }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
